name: PR Title

# Enforces a Conventional Commits PR title. With squash-merge, the PR title
# becomes the commit on main — which is what release-please reads to decide the
# next version and build the changelog. Make this a required status check on
# main (branch protection) so a non-conventional title blocks the merge.

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
