name: Release & Publish

# release-please watches main, opens/updates a release PR (version bump +
# CHANGELOG inferred from conventional commits). Merging that PR cuts a GitHub
# release + tag, and this same run then publishes to npm via Trusted Publishing
# (OIDC) — no NPM_TOKEN. Publish lives in this workflow (not a tag-triggered
# one) because tags pushed by GITHUB_TOKEN don't trigger other workflows.
#
# Trusted Publisher on npmjs.com must point at this repo + workflow filename
# (publish.yml). Also enable: Settings > Actions > General > "Allow GitHub
# Actions to create and approve pull requests" (so release-please can open PRs).

on:
  push:
    branches:
      - main

permissions:
  contents: write # create releases + tags
  pull-requests: write # open/update the release PR
  id-token: write # OIDC trusted publishing

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release

      # Everything below runs only when a release PR was just merged.
      - uses: actions/checkout@v5
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v5
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - if: ${{ steps.release.outputs.release_created }}
        run: npm install -g npm@latest
      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish
