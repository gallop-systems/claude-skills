name: Publish to npm

# Publishes @gallopsystems/agent-skills when a version tag is pushed.
# Auth is via npm Trusted Publishing (OIDC) — no NPM_TOKEN secret is stored.
# Requires the trusted publisher to be configured on npmjs.com for this repo
# and this exact workflow filename (publish.yml).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest
      - run: npm publish
